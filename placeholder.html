<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumi — Binnenkort beschikbaar</title>
  <meta name="description" content="Lumi helpt Amsterdammers het overzicht bewaren over hun gezondheid. Binnenkort beschikbaar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens/design-tokens.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background-color: var(--surface-bg);
      background-image: url('public/assets/gradients/hero-bg.jpg');
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--spacing-lg);
      -webkit-font-smoothing: antialiased;
    }

    .coming-soon {
      max-width: 480px;
    }

    .logo {
      height: 48px;
      width: auto;
      margin-bottom: var(--spacing-xl);
    }

    .payoff {
      font-size: var(--font-size-heading-4);
      font-weight: var(--font-weight-regular);
      color: var(--text-body);
      line-height: 1.6;
      margin-bottom: var(--spacing-3xl);
    }

    .soon {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-3xs);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: var(--spacing-3xs) var(--spacing-sm);
      border-radius: var(--radius-round);
      font-size: var(--font-size-body-small);
      font-weight: var(--font-weight-medium);
      color: var(--text-body);
      margin-bottom: var(--spacing-3xl);
    }

    .soon::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-tertiary-500);
    }

    .partners {
      display: flex;
      gap: var(--spacing-lg);
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0.5;
    }

    .partners img {
      height: 24px;
      width: auto;
    }

    .fade-in {
      animation: fadeIn 1s ease forwards;
      opacity: 0;
    }

    .fade-in:nth-child(2) { animation-delay: 0.2s; }
    .fade-in:nth-child(3) { animation-delay: 0.4s; }
    .fade-in:nth-child(4) { animation-delay: 0.6s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="coming-soon">
    <div class="fade-in">
      <img src="public/assets/logo/Lumi Logo Charcoal.svg" alt="Lumi" class="logo">
    </div>

    <p class="payoff fade-in">
      Alles over jouw gezondheid op één plek.
    </p>

    <div class="fade-in">
      <span class="soon">Binnenkort beschikbaar in Amsterdam</span>
    </div>

  </div>

</body>
</html>
